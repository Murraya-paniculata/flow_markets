# 深度调研 Crew 的 Task 配置（与 tasks/*.yaml 对应，供 CrewBase 使用）
task_plan:
  agent: researcher
  context: []
  description: |
    调研「{{topic}}」的全面信息，包括但不限于：
    请分析这个研究任务，规划完成研究所需的步骤，并设计一份专业的调研报告大纲。
  expected_output: |
    结构化的任务规划文档，包含以下部分：
    1. 任务分析结果：研究目标、关键信息维度、研究复杂度评估
    2. 研究步骤规划（3-8个步骤）：每步含步骤编号、名称、调研目标、关键信息点、预期产出，步骤逻辑连贯
    3. 报告大纲结构（Markdown格式）：完整章节结构、清晰层级、与步骤的对应关系
    输出格式：Markdown 文档，结构清晰，便于后续使用。

task_write:
  agent: writer
  context:
    - task_plan
  description: |
    根据深度研究专家（上一任务）生成的任务步骤和报告大纲，**必须通过工具实际执行**完成研究报告的撰写，禁止仅用文字描述计划或意图。
    你必须按顺序执行以下操作（每步都需真实调用工具或委托）：
    1) 使用 FileWriterTool 将报告大纲写入「{{topic}}-报告大纲.md」；
    2) 对每个研究步骤委托网络搜索专家（searcher）收集信息，使用 FileWriterTool 撰写并写入「{{topic}}-步骤N.md」；
    3) 委托报告审核编辑（editor）审核步骤报告，根据意见用 FileWriterTool 修改；
    4) 使用 FixedDirectoryReadTool 或 FileReadTool 读取大纲与各步骤报告，整合后用 FileWriterTool 写入「{{topic}}-最终报告.md」；
    5) 委托审核编辑做最终审核并根据意见修改。
    重要：每个信息点必须有引用来源 [描述](URL)；未实际调用工具写入文件则视为任务未完成。
  expected_output: |
    本任务完成标准：已通过 FileWriterTool 实际生成文件「{{topic}}-最终报告.md」，且报告内容满足以下要求。
    报告须为完整的 Markdown 格式，满足：
    1. 内容完整性：覆盖所有研究步骤和大纲章节，每个关键信息点有详细说明
    2. 信息准确性：所有信息点有明确引用来源，引用格式 [描述](URL)，链接可访问
    3. 结构规范性：符合报告大纲结构，章节层次清晰，Markdown 格式正确
    4. 质量保证：经过分步审核和最终审核，审核意见已处理，达到发布质量标准
    Final Answer 中须说明已写入的文件路径或粘贴报告全文，不得仅描述计划。
