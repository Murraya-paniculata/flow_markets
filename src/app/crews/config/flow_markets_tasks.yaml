task_fm_technical:
  agent: technical_analyst
  context: []
  description: |
    用户诉求：{{user_query}}，标的：{{symbol}}，补充：{{notes}}。

    执行顺序（必须遵守，单 Task 内完成）：
    1. 先调用工具 get_chan_structure：symbol={{symbol}}（若为「未指定」则仍调用并在摘要中说明），
       timeframe=1h，lookback=300。在得到工具返回前不要撰写最终 JSON。
    2. 工具返回后，按已注入的 chan-analysis Skill 解读 JSON（只分析 ok=true 时的 data；
       ok=false 时按 Skill 声明数据不可用，不得编造笔/中枢）。
    3. 一次输出 TechnicalAnalysisDeliverable（顶层两个字段，勿拆成两次回答）：

    【A】brief（TechnicalBrief，给 FlowMarkets 研究链）
    - ok=true：data_status=有足够K线；structure_quickview=结构事实；summary=推断与失效条件（≥2条）
    - ok=false：data_status=待K线数据；structure_quickview 留空；missing_data_checklist 含 error_code/hint

    【B】chanlun_v2（ok=true 时必填，对齐 chanlun state_machine v2.0）
    - version=2.0，output_mode=state_machine
    - meta：symbol/interval/price/timestamp 来自工具 data
    - state_machine.current_state：STRATEGY_ACTIVE | WAIT_CONFIRMATION | OBSERVE_ONLY 之一
    - state_machine.active_strategy：direction(up/down)、status(WAIT/READY/ACTIVE/INVALIDATED)、
      entry_gate(price_zone 两数、structure_required 非空缠论条件列表)、
      execution(entry_type、stop_loss、target、rr)
    - state_machine.invalidation：invalidate_active_if 至少 1 条；next_state
    - structure_judgement：trend、price_position、zs(zg/zd/gg/dd)
    - risk_notes：风险提示数组
    - brief 与 chanlun_v2 结论须一致，不得矛盾
    - ok=false 时 chanlun_v2=null

    历史胜率降级（若有 stats 上下文）：胜率<25%→OBSERVE_ONLY；25–35%→WAIT_CONFIRMATION；>35%→STRATEGY_ACTIVE。
  expected_output: |
    符合 TechnicalAnalysisDeliverable 的单一 JSON：含 brief 与 chanlun_v2（或 null）。
    结构事实仅来自 get_chan_structure；禁止虚构 K 线、笔、中枢或具体买卖点位。

