task_fm_technical:
  agent: technical_analyst
  context: []
  description: |
    用户诉求：{{user_query}}，标的：{{symbol}}，补充：{{notes}}。

    分析模式：{{analysis_mode}}（single=单周期 | multi_timeframe=多级别联立 4h/1h/15m）

    --- 预注入多级别 JSON（multi_timeframe 模式由服务端写入；single 模式可忽略）---
    {{multi_timeframe_context}}

    === 单周期模式（analysis_mode=single）===
    1. 调用 get_chan_structure：symbol={{symbol}}（「未指定」也调用并在 brief 说明），timeframe={{primary_timeframe}}，lookback={{lookback}}。
       未拿到工具返回前不要写最终 JSON。
    2. 只分析工具返回的 data（ok=false 则只填 brief 待数据项，chanlun_v2=null）。禁止编造笔/中枢/价位；
       禁止用均线、MACD、消息、情绪做依据。

    === 多级别联立（analysis_mode=multi_timeframe）===
    1. 以上「预注入多级别 JSON」已含 4h/1h/15m 结构与 combined_judgment；须三级别联立分析，禁止只看单一级别。
    2. 仍须调用 get_chan_structure：symbol={{symbol}}，timeframe=1h，lookback={{lookback}}——
       仅用于 history（胜率/相似案例/learning_feedback/state_machine_hints）；结构事实以预注入 JSON 为准。
    3. chanlun_v2.meta.interval 固定 1h（中级别）；analysis_markdown 须含多级别段落：
       大级别定方向 → 中级别买卖点 → 小级别入场；写明 combined_judgment.resonance 与级别是否一致。
    4. 概率与状态机须反映级别分歧：resonance=mixed 时宜保守（WAIT_CONFIRMATION / OBSERVE_ONLY）。

    === 通用（两种模式）===
    3. 一次输出 TechnicalAnalysisDeliverable（仅 brief、chanlun_v2 两个顶层键）：

    【结构优先——分配走势概率与状态机前强制执行】
    - 中枢 relation=extend → 震荡概率通常最高（宜≥40%），勿因一笔向下/向上就判单边最高
    - 中枢 relation=new → 多/空/震荡更均衡，避免任一方向概率>50%
    - price_position：inside_zs 偏震荡；above_zs 偏多；below_zs 偏空（均警惕反向）
    - signal 买卖点：仅 ±5%～10% 微调；背驰在 extend 下可能是震荡内小反转，勿轻易单边最高

    【brief】ok=true 时：
    - structure_quickview：一行事实（价、ZG/ZD、最新笔、signal、笔段数）
    - summary：2～3 句执行摘要，不重复长文
    - analysis_markdown：必填六节 Markdown 字符串——
      「一、技术形态概述」「二、当前市场状态」「三、关键技术信号」
      「四、可能走势分析（概率排序）」至少2种至多3种走势、概率合计约100%、
      「五、操作建议」多/空/震荡入场止损目标、「六、风险提示」
    - disclaimer：含历史形态不保证未来表现、不构成投资建议

    【chanlun_v2】ok=true 时必填（version=2.0, output_mode=state_machine）：
    - meta/structure_judgement/risk_notes 与 data 一致
    - state_machine.current_state：STRATEGY_ACTIVE | WAIT_CONFIRMATION | OBSERVE_ONLY
    - active_strategy：direction **仅 up 或 down**（禁止 range；震荡放 standby_strategies.direction=range）；
      entry_gate.price_zone 两数；structure_required 非空；
      execution 含 stop_loss、target、rr
    - invalidation：invalidate_active_if≥1 条；next_state
    - standby_strategies 可选；与 analysis_markdown 主推方向不得矛盾

    【history 硬约束】工具返回 history.state_machine_hints.recommended_floor 非空时：
    - recommended_floor=OBSERVE_ONLY → current_state 必须 OBSERVE_ONLY
    - recommended_floor=WAIT_CONFIRMATION → 不得 STRATEGY_ACTIVE
    - 服务端会在输出后强制降级并在 risk_notes 说明；Prompt 须先遵守，避免与最终交付冲突

  expected_output: |
    单一 JSON：TechnicalAnalysisDeliverable（brief + chanlun_v2 或 null）。
    禁止输出 Markdown 包裹、禁止前言、禁止编造 K 线/笔/中枢/点位。

